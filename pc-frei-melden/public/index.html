<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />

<link rel="manifest" href="/manifest.json" />

<meta name="apple-mobile-web-app-title" content="PC Frei" />
<meta name="theme-color" content="#2f6fed" />
<style>
